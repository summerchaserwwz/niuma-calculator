<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>牛马程度计算器 | 你有多牛马？</title>
  <meta name="description" content="实测你的工作牛马程度！综合薪资、工时、通勤、领导、公司稳定性五维度，2分钟就知道你属于哪个级别的牛马。" />
  <meta property="og:title" content="牛马程度计算器 - 你有多牛马？" />
  <meta property="og:description" content="五维度全面打分，看看你是哪种牛马" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 背景装饰 -->
  <div class="bg-noise"></div>

  <!-- 主题切换 -->
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="切换明暗主题">
    <span id="theme-icon">☀️</span><span id="theme-label">浅色</span>
  </button>

  <div id="app">
    <!-- 进度条 -->
    <div id="prog" class="prog-wrap hidden"></div>

    <!-- 首屏 -->
    <div id="hero" class="card page">
      <span class="hero-icon">🐂</span>
      <h1 class="hero-title">测测你的<br>牛马程度</h1>
      <p class="hero-sub">
        薪资、通勤、领导、稳定性、加班强度五维全测<br>
        看你属于哪个级别的牛马 <span style="font-size:1.1em">😤</span>
      </p>
      <div class="badges">
        <span class="badge">💰 税前换算</span>
        <span class="badge">🏛️ 公司稳定性</span>
        <span class="badge">⏰ 时间成本</span>
        <span class="badge">🌟 领导氛围</span>
        <span class="badge">📊 行业百分位</span>
        <span class="badge">📷 生成分享图</span>
      </div>
      <button class="btn btn-p btn-lg btn-full" onclick="goTo(1)">开始测评 →</button>
      <p class="hero-note">约 2 分钟完成 · 数据仅在本地计算，不上传任何服务器</p>
    </div>

    <!-- 步骤页 -->
    <div id="s1" class="card page hidden"></div>
    <div id="s2" class="card page hidden"></div>
    <div id="s3" class="card page hidden"></div>
    <div id="s4" class="card page hidden"></div>

    <!-- 结果页 -->
    <div id="result" class="card page hidden"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="calculator.js"></script>
  <script src="app.js"></script>
</body>
</html>
